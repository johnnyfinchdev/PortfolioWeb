<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="node_modules/atropos/atropos.css" />
    <title>Portfolio</title>
</head>

<body>
    <div class="mainContent">
        <div id="profileCard" class="profileCard">
            <div id="profileCol1" class="profileCol1">
                <!-- main Atropos container (required), add your custom class here -->
                <div class="atropos my-atropos">
                    <!-- scale container (required) -->
                    <div class="atropos-scale">
                        <!-- rotate container (required) -->
                        <div class="atropos-rotate">
                            <!-- inner container (required) -->
                            <div id="atropos-inner" class="atropos-inner">
                                <img id="profileImg" class="profileImage" />
                                <p id="profileDesc" class="profileDesc"></p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div id="profileCol2" class="profileCol2">
                <p id="profileName" class="profileName"></p>
                <p id="profileRole" class="profileRole"></p>
                <div class="separator"></div>
                <div id="profileSkills" class="profileSkills"></div>
                <div id="profileLinks" class="profileLinks"></div>
            </div>
        </div>
        <div id="downSection" class="downSection">
            <div id='proyectsCard' class="proyectsCard"></div>
        </div>
    </div>
    <script src="node_modules/atropos/atropos.min.js"></script>
    <script src="./script.mjs"></script>
    <script>
        // init Atropos
        const myAtropos = Atropos({
            el: '.my-atropos',
            activeOffset: 100,
            shadow: true,
            shadowScale: 1.05,
        });

    </script>
</body>

</html>
